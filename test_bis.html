<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sidebar scroll</title>
  <style>
    

    /* Sections de contenu pour la démo */
    section {
      padding: 80px 20px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <section id="dev">
    <h1>Section Dev</h1>
    <p>Contenu pour la partie développement...</p>
  </section>

  <section id="jeux">
    <h1>Section Jeux</h1>
    <p>Contenu pour la partie jeux...</p>
  </section>

  <section id="appli">
    <h1>Section Appli</h1>
    <p>Contenu pour la partie applications...</p>
  </section>

  <!-- Sidebar de navigation -->
  <nav class="sidebar" id="sidebar">
    <h3>Navigation</h3>
    <a href="#dev">Dev</a>
    <a href="#jeux">Jeux</a>
    <a href="#appli">Appli</a>
  </nav>

  <script>
    const sidebar = document.getElementById('sidebar');

    window.addEventListener('scroll', () => {
      // Quand on a scrollé de plus de 100px, on affiche la barre
      if (window.scrollY > 100) {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
