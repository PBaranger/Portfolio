
<style>
    body {
    margin: 0;
    font-family: sans-serif;
    min-height: 200vh;
  }

  /* Sidebar totalement transparente */
  .sidebar {
    position: fixed;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    width: 140px;
    transition: right 0.3s ease;
    z-index: 1000;
  }

  .sidebar.visible {
    right: 0;
  }

  .sidebar h3 {
    margin: 0 0 20px;
    padding-left: 10px;
    font-size: 15px;
    font-weight: 600;
    color: #333;
  }

  .sidebar a {
    display: block;
    padding: 18px 22px;
    color: #333;
    text-decoration: none;
    font-size: 16px;
    width: 120px;
    text-align: center;
  }

  /* Ligne séparatrice fine */
  .sidebar a + a {
    border-top: 1px solid #ccc;
  }

  .sidebar a:hover {
    color: #000;
    font-weight: 600;
  }

    /* Sections de contenu pour la démo */
    section {
      padding: 80px 20px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>

  <section id="dev">
    <h1>Section Dev</h1>
    <p>Contenu pour la partie développement...</p>
  </section>

  <section id="jeux">
    <h1>Section Jeux</h1>
    <p>Contenu pour la partie jeux...</p>
  </section>

  <section id="appli">
    <h1>Section Appli</h1>
    <p>Contenu pour la partie applications...</p>
  </section>

  <!-- Sidebar de navigation -->
  <nav class="sidebar" id="sidebar">
    <h3>Navigation</h3>
    <a href="#dev">Dev</a>
    <a href="#jeux">Jeux</a>
    <a href="#appli">Appli</a>
  </nav>

  <script>
    const sidebar = document.getElementById('sidebar');

    window.addEventListener('scroll', () => {
      // Quand on a scrollé de plus de 100px, on affiche la barre
      if (window.scrollY > 100) {
        sidebar.classList.add('visible');
      } else {
        sidebar.classList.remove('visible');
      }
    });
  </script>
